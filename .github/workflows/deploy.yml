name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  SERVICE_NAME: live-jam-space
  REGION: ${{ secrets.GCP_REGION }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPO_NAME: live-jam-space
  AGENT_PULSE_URL: ${{ secrets.AGENT_PULSE_URL }}
  AGENT_GHOST_URL: ${{ secrets.AGENT_GHOST_URL }}
  AGENT_CHAOS_URL: ${{ secrets.AGENT_CHAOS_URL }}
  AGENT_WAVE_URL: ${{ secrets.AGENT_WAVE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE \
            --region ${{ env.REGION }} \
            --platform managed \
            --timeout=3600 \
            --session-affinity \
            --allow-unauthenticated \
            --set-env-vars "AGENT_PULSE_URL=${{ env.AGENT_PULSE_URL }},AGENT_GHOST_URL=${{ env.AGENT_GHOST_URL }},AGENT_CHAOS_URL=${{ env.AGENT_CHAOS_URL }},AGENT_WAVE_URL=${{ env.AGENT_WAVE_URL }}"
